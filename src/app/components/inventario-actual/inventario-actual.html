<p-toast></p-toast>
<div class="container-fluid">
    <div class="div-conten grid p-fluid">
        <p class="pi pi-pen-to-square"> Cargar stock actual:</p>
        <p> Fecha cargue: {{fecha_actual}}</p>
        <hr>
        <div class="content">
            <div class="flex flex-col">
                <form [formGroup]="formId">
                    <label for="integeronly">Registros cargados</label>
                    <p-inputNumber inputId="integeronly" formControlName="id_inv" autocomplete="off"
                        readonly="off"></p-inputNumber>
                </form>
            </div>
            <div class="flex flex-col">
                <button pButton pRipple type="button" label="Cargar nuevo stock" icon="pi pi-save" iconPos="left"
                    class="p-button-success w-full" (click)="func_registra_inventario_actual();"></button>
            </div>
        </div>
    </div>
</div>
