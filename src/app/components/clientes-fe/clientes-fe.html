<p-toast></p-toast>
<div class="container-fluid">
    <div class="div-container">
        <p class="pi pi-users"> Nuevo cliente:</p>
        <br>
        <span> Fecha:
            {{fecha_actual | date:'dd-MM-yyyy'}}
        </span>
        <hr>
        <div class="content">
            <form [formGroup]="data">
                <div class="content-1">
                    <div class="item-1">
                        <div class="flex flex-col">
                            <label for="mySelect">Tipo identificación</label>
                            <p-select id="mySelect" [(ngModel)]="seleccionado" [options]="data_tipo_ident"
                                optionValue="id" optionLabel="nombre" [showClear]="true" formControlName="tipo_ident" />
                        </div>
                    </div>
                    <div class="item-1">
                        <div class="flex flex-col">
                            <label for="cedula">Identificación:</label>
                            <input id="cedula" type="text" class="form-control" pInputText formControlName="ident"
                                (keyup.enter)="on_enter_cedula_cliente($event)" autocomplete="off">
                        </div>
                    </div>
                    <div class="item-1-1">
                        <div class="flex flex-col">
                            <label for="nomCliente">Nombre</label>
                            <input id="nomCliente" type="text" class="form-control input-pers" pInputText
                                formControlName="nombre" (keyup.enter)="on_enter_nombre_cliente($event)"
                                autocomplete="off">
                        </div>
                    </div>
                </div>
                <div class="content-2">
                    <div class="item-2">
                        <div class="flex flex-col">
                            <label for="mySelect">Municipio</label>
                            <p-select id="mySelect" [(ngModel)]="seleccionado2" [options]="data_municipio"
                                optionValue="id" optionLabel="nombre" [showClear]="true" formControlName="munic" />
                        </div>
                    </div>
                    <div class="item-2">
                        <div class="flex flex-col">
                            <label for="tel">Teléfono</label>
                            <input id="tel" type="text" class="form-control" pInputText formControlName="telef"
                                autocomplete="off">
                        </div>
                    </div>
                    <div class="item-2-1">
                        <div class="flex flex-col">
                            <label for="tel">Correo</label>
                            <input id="tel" type="text" class="form-control input-pers" pInputText
                                formControlName="correo" autocomplete="off">
                        </div>
                    </div>
                </div>
                <div class="content-3">
                    <div class="item-3">
                        <div class="flex flex-col">
                            <label for="mySelect">Tipo organización</label>
                            <p-select id="mySelect" [(ngModel)]="seleccionado3" [options]="data_tipo_org"
                                optionValue="id" optionLabel="nombre" [showClear]="true" formControlName="tipo_org" />
                        </div>
                    </div>
                    <div class="item-3">
                        <div class="flex flex-col">
                            <label for="mySelect">Tipo regimenes</label>
                            <p-select id="mySelect" [(ngModel)]="seleccionado5" [options]="data_tipo_reg"
                                optionValue="id" optionLabel="nombre" [showClear]="true" formControlName="tipo_reg" />
                        </div>
                    </div>
                    <div class="item-3-1">
                        <div class="flex flex-col">
                            <label for="mySelect">Tipo responsabilidad</label>
                            <p-select id="mySelect" [(ngModel)]="seleccionado4" [options]="data_tipo_resp"
                                class="input-pers" optionValue="id" optionLabel="nombre" [showClear]="true"
                                formControlName="tipo_resp" />
                        </div>
                    </div>
                </div>
                <div class="content-4 mt-3">
                    <div class="item-4">
                        <div class="flex flex-col">
                            <button pButton pRipple label="Guardar" icon="pi pi-save" class="p-button-success w-full"
                                (click)="funct_registra_clientes_c();"></button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
